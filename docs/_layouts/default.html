<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    
    <!-- Basic styling -->
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-muted: #666666;
            --accent: #000000;
            --border: #eeeeee;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
            --font-mono: "SF Mono", "Roboto Mono", Menlo, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-main);
            line-height: 1.6;
            color: var(--text);
            background-color: var(--bg);
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 800px; /* Narrower for better readability */
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        header {
            padding: 4rem 0 2rem;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }
        
        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.02em;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
        }
        
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            transition: color 0.2s ease;
        }
        
        nav a:hover {
            color: var(--accent);
        }
        
        main {
            min-height: calc(100vh - 300px);
            padding: 2rem 0 4rem;
        }
        
        footer {
            padding: 4rem 0;
            border-top: 1px solid var(--border);
            text-align: left;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Typography improvements */
        h1, h2, h3 { 
            letter-spacing: -0.03em; 
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        
        p { margin-bottom: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="{{ '/' | relative_url }}" class="logo">Home</a>
                <nav>
                    <ul>
                        <li><a href="{{ '/blog' | relative_url }}">Blog</a></li>
                        <li><a href="{{ '/notes' | relative_url }}">Notes</a></li>
                        <li><a href="{{ '/hire-me' | relative_url }}">Hire Me</a></li>
                        <li><a href="{{ '/teaching' | relative_url }}">Teaching</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            {{ content }}
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
